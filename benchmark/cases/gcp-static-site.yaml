id: gcp-static-site
paper_id: gcp-static-site
name: CloudBench GCP Static Site
description: B2 static content on Google Cloud — a static website served from object storage (Cloud Storage),
  no application server. The repo is a plain static site with no IaC; provisioning the bucket and serving
  it (Cloud Storage static hosting, optionally behind Cloud CDN) is the system-under-test's job.
repo_url: https://github.com/oodunsi1/cloudbench-gcp-static-site
commit: eddc5d356f1c3d13de5f681062cd0e576605de87
level: 2
provider: gcp
primary_service: gcs
aws_services: []
building_block: B2
workload_kind: static_site
ask_type: app-repo
runtime:
  language: html
expected_service_families:
- s3
validation_contract:
  expected_status: success
  run_instructions_summary: Set SITE_URL to the provisioned static-site endpoint, then run ./run.sh.
  stdout_contains:
  - static site OK
  probe:
    component_id: storage
    probe_type: http_status
    expectation: the site URL returns 200 and serves index.html with the CLOUDBENCH_STATIC_OK marker
teardown_contract:
  method: terraform destroy
  residual_check: no Cloud Storage buckets from this run remain
  proof_artifact: terraform_runs/<slug>/<timestamp>/deployment_proof.json
