id: aws-elasticache-service
paper_id: aws-elasticache-service
name: CloudBench AWS Cache-Backed Service
description: 'B3 compute + a managed cache. A Flask service backed by a Redis cache (ElastiCache): set/get
  round-trip values, /health returns CLOUDBENCH_CACHE_OK. No IaC; provisioning compute + the cache is
  the system-under-test''s job. A second B3 service exercising the cache tier (vs aws-rds-api''s database).'
repo_url: https://github.com/oodunsi1/cloudbench-aws-elasticache-service
commit: 9d601da380988e92b25e453cb5f661fd42c807fa
level: 3
provider: aws
primary_service: elasticache
aws_services:
- ec2
- elasticache
- iam
building_block: B3
workload_kind: api_service
ask_type: app-repo
runtime:
  language: python
  framework: flask
expected_service_families:
- compute
- security_group
- iam_role
- iam_instance_profile
- cache
validation_contract:
  expected_status: success
  run_instructions_summary: Set CLOUDBENCH_REDIS_HOST to the provisioned cache endpoint, run ./run.sh,
    then GET /health.
  stdout_contains:
  - CLOUDBENCH_CACHE_OK
  probe:
    component_id: cache
    probe_type: http_status
    expectation: GET /health returns 200 with CLOUDBENCH_CACHE_OK and set/get round-trips through the
      cache
teardown_contract:
  method: terraform destroy
  residual_check: no EC2 instances or ElastiCache clusters from this run remain
  proof_artifact: terraform_runs/<slug>/<timestamp>/deployment_proof.json
