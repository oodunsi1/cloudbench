id: aws-scheduled-cron
paper_id: aws-scheduled-cron
name: CloudBench AWS Scheduled Cron Job
description: 'B1 compute + runtime, run on a schedule. A small recurring job: each run appends a heartbeat
  line (marker CLOUDBENCH_CRON_OK + a UTC timestamp) to output/heartbeat.log. The repo has no IaC; provisioning
  compute and scheduling the job (cron / systemd timer / EventBridge) is the system-under-test''s job.'
repo_url: https://github.com/oodunsi1/cloudbench-aws-scheduled-cron
commit: 205b74fa5a0576642dac75b3d86e9fc53df9ec52
level: 1
provider: aws
primary_service: ec2
aws_services:
- ec2
- iam
building_block: B1
workload_kind: worker
ask_type: app-repo
runtime:
  language: python
expected_service_families:
- compute
- security_group
- iam_role
- iam_instance_profile
validation_contract:
  expected_status: success
  run_instructions_summary: A scheduled tick runs ./run.sh, which executes job.py.
  stdout_contains:
  - CLOUDBENCH_CRON_OK
  probe:
    component_id: compute
    probe_type: execution_exit_code
    expectation: a scheduled tick runs the job, exits 0, and emits the CLOUDBENCH_CRON_OK marker
teardown_contract:
  method: terraform destroy
  residual_check: no EC2 instances or schedules from this run remain
  proof_artifact: terraform_runs/<slug>/<timestamp>/deployment_proof.json
