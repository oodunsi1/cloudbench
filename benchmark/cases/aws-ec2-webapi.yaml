id: aws-ec2-webapi
paper_id: aws-ec2-webapi
name: CloudBench AWS Stateless Web API
description: 'B1 compute + runtime. A small stateless HTTP service (Flask): GET /health returns CLOUDBENCH_WEBAPI_OK,
  POST /echo echoes its body. No database. The repo has no IaC; provisioning compute and exposing the
  service is the system-under-test''s job.'
repo_url: https://github.com/oodunsi1/cloudbench-aws-ec2-webapi
commit: b846a3908e2f2ee34e9131ac6505be8c03c839d5
level: 1
provider: aws
primary_service: ec2
aws_services:
- ec2
- iam
building_block: B1
workload_kind: api_service
ask_type: app-repo
runtime:
  language: python
  framework: flask
expected_service_families:
- compute
- security_group
- iam_role
- iam_instance_profile
validation_contract:
  expected_status: success
  run_instructions_summary: Provision compute, run ./run.sh, expose the app port, then GET /health.
  stdout_contains:
  - CLOUDBENCH_WEBAPI_OK
  probe:
    component_id: compute
    probe_type: http_status
    expectation: GET /health returns 200 with the CLOUDBENCH_WEBAPI_OK marker
teardown_contract:
  method: terraform destroy
  residual_check: no EC2 instances from this run remain
  proof_artifact: terraform_runs/<slug>/<timestamp>/deployment_proof.json
