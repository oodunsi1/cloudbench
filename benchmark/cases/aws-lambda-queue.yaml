id: aws-lambda-queue
paper_id: aws-lambda-queue
name: CloudBench AWS Lambda Queue Worker
description: 'B5 event-driven serverless. An AWS Lambda handler triggered by SQS: for each message it
  does a tiny unit of work and emits the marker CLOUDBENCH_EVENT_OK. The repo has no IaC; provisioning
  the SQS queue, packaging the Lambda, and wiring the event source + IAM is the system-under-test''s job.'
repo_url: https://github.com/oodunsi1/cloudbench-aws-lambda-queue
commit: f96b80d05f1b54da266253fb96609eb1fc29c913
level: 5
provider: aws
primary_service: lambda
aws_services:
- lambda
- sqs
- iam
building_block: B5
workload_kind: worker
ask_type: app-repo
runtime:
  language: python
expected_service_families:
- lambda
- sqs
- iam_role
validation_contract:
  expected_status: success
  run_instructions_summary: Send a message to the provisioned queue; the Lambda is invoked and processes
    it. Locally, `python handler.py` runs a smoke test with a synthetic SQS event.
  stdout_contains:
  - CLOUDBENCH_EVENT_OK
  probe:
    component_id: lambda
    probe_type: log_contains
    expectation: a queued message triggers the Lambda, which emits CLOUDBENCH_EVENT_OK
teardown_contract:
  method: terraform destroy
  residual_check: no Lambda functions or SQS queues from this run remain
  proof_artifact: terraform_runs/<slug>/<timestamp>/deployment_proof.json
