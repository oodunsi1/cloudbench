id: aws-mlai-inference
paper_id: aws-mlai-inference
name: CloudBench AWS ML Inference Service
description: 'B3 compute + a model store. A small ML inference service (Flask): POST /predict returns
  a prediction from a model loaded from object storage (CLOUDBENCH_MODEL_URI), GET /health returns the
  marker CLOUDBENCH_MLAI_OK. The repo has no IaC; provisioning compute + the S3 model bucket + IAM is
  the system-under-test''s job.'
repo_url: https://github.com/oodunsi1/cloudbench-aws-mlai-inference
commit: 01171d2ed58076b8cbff35fbad5fce40210a2edf
level: 3
provider: aws
primary_service: ec2
aws_services:
- ec2
- s3
- iam
building_block: B3
workload_kind: api_service
ask_type: app-repo
runtime:
  language: python
  framework: flask
expected_service_families:
- compute
- security_group
- iam_role
- iam_instance_profile
- s3
validation_contract:
  expected_status: success
  run_instructions_summary: Set CLOUDBENCH_MODEL_URI to the model's s3:// location, then run ./run.sh;
    the service serves /predict and /health.
  stdout_contains:
  - CLOUDBENCH_MLAI_OK
  probe:
    component_id: compute
    probe_type: http_status
    expectation: GET /health returns 200 with the CLOUDBENCH_MLAI_OK marker and /predict returns a prediction
teardown_contract:
  method: terraform destroy
  residual_check: no EC2 instances or S3 buckets from this run remain
  proof_artifact: terraform_runs/<slug>/<timestamp>/deployment_proof.json
