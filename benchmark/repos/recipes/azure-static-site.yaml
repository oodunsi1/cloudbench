# Recipe — azure-static-site (work-kind: static, B2, provider: azure). Mirrors gcp-static-site on Azure.
cell: azure-static-site
archetype: static-site
display_name: CloudBench Azure Static Site
repo_name: cloudbench-azure-static-site
provider: azure
primary_service: blob_storage
building_block: B2
work_kind: static_site
level: 2
ask_type: app-repo
runtime:
  language: html
description: >
  B2 static content on Microsoft Azure — a static website served from object storage (a Storage Account
  static website / Blob), no application server. The repo is a plain static site with no IaC;
  provisioning the storage account and serving it is the system-under-test's job.
needs_service_families:
  - s3            # object storage — the provider-agnostic family label (Azure Blob maps to it)
azure_services: [storage]
success_check:
  run_instructions: >
    Set SITE_URL to the provisioned static-site endpoint, then run ./run.sh.
  stdout_contains: ["static site OK"]
  probe:
    component_id: storage
    probe_type: http_status
    expectation: the site URL returns 200 and serves index.html with the CLOUDBENCH_STATIC_OK marker
teardown_check:
  method: terraform destroy
  residual_check: no storage accounts from this run remain
app_files:
  - README.md
  - index.html
  - style.css
  - run.sh
  - .gitignore
constraints:
  - No infrastructure-as-code in the app repo — provisioning is the system-under-test's job.
  - No credentials in the repo.
  - The marker CLOUDBENCH_STATIC_OK must be served verbatim.
